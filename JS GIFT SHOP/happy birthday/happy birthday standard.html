<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focused - 10 Mini Projects</title>
    <style>
        /* Dark Theme Design */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 8px;
            color: #38bdf8;
            margin-bottom: 50px;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(1, 134, 187);
        }

        /* 10 files-aiyum grid-ah vakkurathuku */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .mini-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            height: 150px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .mini-card:hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgb(1, 134, 187);
        }

        /* Iframe preview settings */
        iframe {
            width: 200%;
            height: 200%;
            border: none;
            pointer-events: none; /* Click panna iframe kulla pogama irukka */
            zoom: 0.5; /* Preview size-ah kurikka */
            -moz-transform: scale(0.5);
            -moz-transform-origin: 0 0;
        }

        .label {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            width: 100%;
            text-align: center;
            padding: 5px 0;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>STANDARD</h1>

    <div class="grid-container">
        <div class="mini-card" onclick="window.location.href='standard/Confetti-Rain.html'">
            <iframe src="standard/Confetti-Rain.html"></iframe>
            <div class="label">Confetti-Rain</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Cyberpunk-Neon.html'">
            <iframe src="standard/Cyberpunk-Neon.html"></iframe>
            <div class="label">Cyberpunk-Neon</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Emoji-Burst-on-Click.html'">
            <iframe src="standard/Emoji-Burst-on-Click.html"></iframe>
            <div class="label">Emoji-Burst-on-Click</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Floating-3D-Card.html'">
            <iframe src="standard/Floating-3D-Card.html"></iframe>
            <div class="label">Floating-3D-Card</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Kids-Safari-Animated.html'">
            <iframe src="standard/Kids-Safari-Animated.html"></iframe>
            <div class="label">Kids-Safari-Animated</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Musical-Note-Pulse.html'">
            <iframe src="standard/Musical-Note-Pulse.html"></iframe>
            <div class="label">Musical-Note-Pulse</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Romantic-Soft-GlowRomantic-Soft-Glow.html'">
            <iframe src="standard/Romantic-Soft-Glow.html"></iframe>
            <div class="label">Romantic-Soft-Glow</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Shimmering-Text.html'">
            <iframe src="standard/Shimmering-Text.html"></iframe>
            <div class="label">Shimmering-Text</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Space-Galaxy.html'">
            <iframe src="standard/Space-Galaxy.html"></iframe>
            <div class="label">Space-Galaxy</div>
        </div>

        <div class="mini-card" onclick="window.location.href='standard/Tropical-Jungle.html'">
            <iframe src="standard/Tropical-Jungle.html"></iframe>
            <div class="label">Tropical-Jungle</div>
        </div>

    </div>
    

</body>
</html>
