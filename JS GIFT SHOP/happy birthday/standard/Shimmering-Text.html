<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shimmer Birthday</title>
    <style>
        :root {
            --bg-color: #050505;
            /* High-end Metallic Colors */
            --base-text: #444;
            --shimmer-bright: #ffffff;
            --shimmer-gold: #f1c40f;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* The Shimmer Logic */
        .shimmer-text {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px;
            position: relative;
            
            /* 1. Set the base color */
            color: var(--base-text);
            
            /* 2. Create the "Light Sweep" using a gradient */
            background: linear-gradient(
                to right, 
                var(--base-text) 20%, 
                var(--shimmer-bright) 40%, 
                var(--shimmer-gold) 50%, 
                var(--shimmer-bright) 60%, 
                var(--base-text) 80%
            );
            
            /* 3. Clip the background to the text */
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* 4. The Animation */
            animation: 
                shine 4s linear infinite,
                breath 8s ease-in-out infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes breath {
            0%, 100% { letter-spacing: 15px; filter: blur(0px); }
            50% { letter-spacing: 20px; filter: blur(0.5px); opacity: 0.8; }
        }

        /* Ambient Glow in the background */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            letter-spacing: 5px;
            margin-top: 20px;
            text-transform: uppercase;
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1 class="shimmer-text">Happy<br>Birthday</h1>
        <p>Excellence in every moment</p>
    </div>

</body>
</html>
