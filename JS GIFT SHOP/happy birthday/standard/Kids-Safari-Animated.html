<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Adventure Birthday</title>
    <style>
        :root {
            --jungle-green: #2d6a4f;
            --leaf-light: #74c69d;
            --safari-orange: #ff9f1c;
            --sky-blue: #ade8f4;
            --ground-brown: #9c6644;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--sky-blue);
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
        }

        /* Parallax Jungle Layers */
        .layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            pointer-events: none;
        }

        /* Animated Grass & Leaves */
        .foliage {
            height: 150px;
            background: var(--jungle-green);
            z-index: 10;
            border-top-left-radius: 50% 20px;
            border-top-right-radius: 50% 20px;
        }

        /* The Peeking Lion */
        .animal-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            cursor: pointer;
            pointer-events: all;
        }

        .lion {
            font-size: 8rem;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: peek 4s ease-in-out infinite;
        }

        @keyframes peek {
            0%, 100% { transform: translateY(50px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .animal-container:hover .lion {
            transform: scale(1.2) translateY(-40px);
        }

        /* Floating Clouds */
        .cloud {
            position: absolute;
            background: white;
            width: 100px;
            height: 40px;
            border-radius: 50px;
            opacity: 0.8;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            from { left: -150px; }
            to { left: 110%; }
        }

        .content {
            position: relative;
            z-index: 20;
            text-align: center;
            margin-top: 50px;
            color: white;
            text-shadow: 3px 3px 0px var(--jungle-green);
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            filter: drop-shadow(0 5px 0px rgba(0,0,0,0.2));
        }

        .banner {
            background: var(--safari-orange);
            display: inline-block;
            padding: 10px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            box-shadow: 0 10px 0px #e67e22;
            transform: rotate(-2deg);
        }

        /* Interactive Particle */
        .leaf-particle {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 15;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="cloud" style="top: 10%; animation-duration: 25s;"></div>
    <div class="cloud" style="top: 25%; animation-duration: 18s; transform: scale(1.5);"></div>

    <div class="content">
        <div class="banner">WILD ONE!</div>
        <h1>HAPPY BIRTHDAY</h1>
    </div>

    <div class="animal-container" onclick="roar()">
        <div class="lion" id="mainAnimal">🦁</div>
    </div>

    <div class="layer foliage"></div>

    <script>
        const animals = ['🦁', '🐯', '🦒', '🐘', '🦓', '🐒'];
        let animalIndex = 0;

        // Change animal on click
        function roar() {
            const lion = document.getElementById('mainAnimal');
            animalIndex = (animalIndex + 1) % animals.length;
            
            // "Jump" animation
            lion.style.transform = "scale(1.5) translateY(-100px)";
            
            setTimeout(() => {
                lion.innerText = animals[animalIndex];
                // Spawn leaf explosion
                for(let i=0; i<8; i++) spawnLeaf();
            }, 100);
        }

        function spawnLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf-particle';
            leaf.innerText = '🍃';
            leaf.style.left = '50%';
            leaf.style.bottom = '150px';
            
            document.body.appendChild(leaf);

            const destX = (Math.random() - 0.5) * 600;
            const destY = -(Math.random() * 400 + 100);
            const rot = Math.random() * 720;

            leaf.animate([
                { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${destX}px, ${destY}px) rotate(${rot}deg)`, opacity: 0 }
            ], {
                duration: 1500,
                easing: 'ease-out'
            }).onfinish = () => leaf.remove();
        }

        // Ambient leaf drop
        setInterval(spawnLeaf, 3000);
    </script>
</body>
</html>
