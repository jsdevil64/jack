<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Emoji Burst Birthday</title>
    <style>
        :root {
            --bg-color: #0d0221;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* The Main Interaction Hub */
        .gift-box {
            position: relative;
            z-index: 10;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gift-box:active {
            transform: scale(0.9);
        }

        .gift-emoji {
            font-size: 8rem;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
        }

        h1 {
            color: white;
            margin-top: 20px;
            letter-spacing: 5px;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* Particle Styling */
        .emoji-particle {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            font-size: 2rem;
            z-index: 100;
            will-change: transform, opacity;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="gift-box" id="mainBox">
        <div class="gift-emoji">🎁</div>
        <h1>Open Me</h1>
    </div>

    <div class="hint">CLICK THE BOX OR ANYWHERE TO POP!</div>

    <script>
        const emojis = ['🎂', '🎉', '🎈', '✨', '🎁', '🥳', '🧁', '🎊'];
        
        function createBurst(x, y, amount) {
            for (let i = 0; i < amount; i++) {
                const particle = document.createElement('div');
                particle.className = 'emoji-particle';
                particle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Randomize trajectory
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 15;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                // Starting Position
                let posX = x;
                let posY = y;
                let rotation = 0;
                let opacity = 1;
                const rotSpeed = (Math.random() - 0.5) * 20;

                document.body.appendChild(particle);

                // Animation Frame Loop
                function update() {
                    posX += vx;
                    posY += vy;
                    // Apply "Gravity"
                    const currentVY = vy + (0.2); // Slight downward pull
                    
                    rotation += rotSpeed;
                    opacity -= 0.015; // Fade out speed

                    particle.style.transform = `translate(${posX}px, ${posY}px) rotate(${rotation}deg)`;
                    particle.style.opacity = opacity;

                    if (opacity > 0) {
                        requestAnimationFrame(update);
                    } else {
                        particle.remove();
                    }
                }
                
                requestAnimationFrame(update);
            }
        }

        // Click Main Box (Large Burst)
        document.getElementById('mainBox').addEventListener('click', (e) => {
            const box = e.currentTarget;
            if(box.querySelector('h1').innerText !== "HAPPY BIRTHDAY") {
                box.querySelector('.gift-emoji').innerHTML = "🎂";
                box.querySelector('h1').innerHTML = "HAPPY BIRTHDAY";
                box.querySelector('h1').style.color = "var(--accent-gold)";
            }
            createBurst(e.clientX, e.clientY, 30);
        });

        // Click Anywhere (Small Burst)
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#mainBox')) return; // Avoid double trigger
            createBurst(e.clientX, e.clientY, 10);
        });

    </script>
</body>
</html>
