<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Birthday | across the Galaxy</title>
    <style>
        :root {
            --space-black: #02010a;
            --nebula-purple: #5e17eb;
            --stardust-gold: #ffdf00;
            --void-blue: #03045e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--space-black);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Nebula Background */
        .nebula {
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(94, 23, 235, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(3, 4, 94, 0.2) 0%, transparent 40%);
            filter: blur(80px);
            z-index: 1;
            animation: drift 20s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1) rotate(0deg); }
            to { transform: scale(1.2) rotate(5deg); }
        }

        /* Starfield Canvas */
        #starCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            perspective: 1000px;
        }

        /* Glassmorphism Orbit Card */
        .orbit-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 80px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(5deg); }
            50% { transform: translateY(-20px) rotateX(-5deg); }
        }

        .cosmic-title {
            font-size: 0.8rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--stardust-gold);
            margin-bottom: 20px;
            font-weight: 300;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to bottom, #ffffff 30%, #a2d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(162, 210, 255, 0.5));
        }

        .planet {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #ff4d6d, #ffafcc);
            border-radius: 50%;
            top: -30px;
            right: -30px;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 0 0 20px rgba(255, 77, 109, 0.4);
        }

        .planet::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(20deg);
            width: 100px;
            height: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="nebula"></div>
    <canvas id="starCanvas"></canvas>

    <div class="content">
        <div class="orbit-card">
            <div class="planet"></div>
            <div class="cosmic-title">Mission Update: Year Complete</div>
            <h1>HAPPY<br>BIRTHDAY</h1>
            <p style="margin-top: 30px; opacity: 0.6; font-weight: 300; letter-spacing: 2px;">One more orbit around the sun.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.2 + 0.05;
                this.opacity = Math.random();
                this.blink = Math.random() * 0.02;
            }
            update() {
                this.y -= this.speed;
                this.opacity += this.blink;
                if (this.opacity > 1 || this.opacity < 0) this.blink *= -1;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push(new Star());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.update();
                s.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();

        // Mouse interaction for parallax
        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            document.querySelector('.orbit-card').style.transform = `translate(${moveX}px, ${moveY}px) rotateX(${5 - moveY}deg) rotateY(${moveX}deg)`;
        });
    </script>
</body>
</html>
