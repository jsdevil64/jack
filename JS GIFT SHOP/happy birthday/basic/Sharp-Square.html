<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Sharp Square</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: 'Helvetica', 'Arial', sans-serif;
        }

        .card {
            background-color: #ffffff;
            padding: 50px;
            width: 320px;
            text-align: center;
            /* 16. Sharp Square (The Feature) */
            border-radius: 0px; 
            /* 11. Thick Solid Border (Deep Red) */
            border: 10px solid #ff0000;
            /* 19. Shadow-only (Hard Offset Shadow) */
            box-shadow: 15px 15px 0px #000000;
            position: relative;
        }

        /* 44. Wrapped Gift 🎁 */
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
            border-bottom: 5px solid #ff0000;
            padding-bottom: 10px;
        }

        /* 37. All Caps Impact Typography */
        h1 {
            color: #000000;
            font-size: 2.2rem;
            margin: 10px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        p {
            color: #333;
            font-size: 1.1rem;
            line-height: 1.4;
            font-weight: 700;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🎁</div>
        <h1>ITS YOUR DAY</h1>
        <p>NO ROUNDED EDGES. JUST BOLD WISHES.</p>
    </div>

</body>
</html>
