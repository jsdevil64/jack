<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Handwritten Script</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff9f9; /* 10. Earthy Pastel (Soft Blush) */
            /* 35. Handwriting / Script (The Feature) */
            font-family: 'Brush Script MT', 'Dancing Script', cursive;
            color: #4a4a4a;
        }

        .note-container {
            text-align: center;
            padding: 40px;
            max-width: 380px;
            position: relative;
        }

        /* 41. Floating Heart ❤️ */
        .icon {
            font-size: 35px;
            color: #ff7675;
            margin-bottom: 10px;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 400;
            line-height: 1.1;
            color: #d63031; /* Deep Red */
        }

        p {
            font-family: 'Segoe UI', Tahoma, sans-serif; /* Mix with clean Sans */
            font-size: 1rem;
            line-height: 1.6;
            color: #636e72;
            margin-top: 25px;
            font-style: italic;
        }

        /* 14. Dashed / Dotted Line (Hand-drawn look) */
        .underline {
            width: 80px;
            height: 2px;
            border-bottom: 2px dashed #ff7675;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="note-container">
        <div class="icon">❤️</div>
        <h1>Simply <br> Special.</h1>
        <div class="underline"></div>
        <p>Wishing you a day that feels just as warm and wonderful as you are.</p>
    </div>

</body>
</html>
