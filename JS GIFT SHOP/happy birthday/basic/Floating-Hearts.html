<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Floating Hearts</title>
    <style>
        body {
            margin: 0;
            background-color: #fff0f3; /* 10. Earthy Pastel (Soft Pink) */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 41. Floating Hearts Animation (The Feature) */
        .heart {
            position: absolute;
            bottom: -50px;
            color: #ff4d6d;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            animation: float-up 6s linear infinite;
            opacity: 0.8;
        }

        @keyframes float-up {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) translateX(50px) rotate(45deg); opacity: 0; }
        }

        /* Create different start positions for hearts */
        .h1 { left: 10%; animation-duration: 5s; font-size: 20px; }
        .h2 { left: 30%; animation-duration: 7s; font-size: 30px; animation-delay: 2s; }
        .h3 { left: 55%; animation-duration: 6s; font-size: 25px; animation-delay: 1s; }
        .h4 { left: 80%; animation-duration: 8s; font-size: 22px; animation-delay: 3s; }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px; /* 15. Rounded Pill/Large Radius */
            text-align: center;
            z-index: 10;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.1);
        }

        /* 35. Handwriting / Script Style */
        h1 {
            font-family: 'Brush Script MT', cursive;
            font-size: 3.5rem;
            color: #ff4d6d;
            margin: 0;
        }

        p {
            color: #594e50;
            font-size: 1rem;
            margin-top: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="heart h1">❤️</div>
    <div class="heart h2">💖</div>
    <div class="heart h3">❤️</div>
    <div class="heart h4">💓</div>

    <div class="card">
        <h1>All the Love.</h1>
        <p>A beautiful day for a <br> beautiful soul.</p>
    </div>

</body>
</html>
