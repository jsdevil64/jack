<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Full-Screen Type</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000; /* 3. Midnight Black */
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 26. Full-Screen Typography (The Feature) */
        .text-container {
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        h1 {
            /* 31. Big Bold Sans-serif */
            font-size: 15vw; /* Fluid size based on screen width */
            line-height: 0.8;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -5px;
            /* 2. Neo-noir / High Contrast */
            text-shadow: 10px 10px 0px #ff0000; 
        }

        .sub-text {
            font-size: 1.5rem;
            color: #ff0000;
            font-weight: 900;
            margin-top: 20px;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        /* Subtle Background Glitch */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="text-container">
        <h1>HBD<br>TO<br>YOU</h1>
        <div class="sub-text">LEVEL 26 UNLOCKED</div>
    </div>

</body>
</html>
