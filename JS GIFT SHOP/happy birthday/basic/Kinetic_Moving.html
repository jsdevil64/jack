<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Kinetic Type</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 3. Midnight Black */
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* 40. Kinetic / Moving Typography (The Feature) */
        .marquee-wrapper {
            display: flex;
            overflow: hidden;
            white-space: nowrap;
            border-top: 2px solid #ffde59; /* 8. High-Contrast Yellow */
            border-bottom: 2px solid #ffde59;
            padding: 20px 0;
            background: #111;
            transform: rotate(-3deg) scale(1.1); /* Adds aggressive "Designer" tilt */
        }

        .marquee-content {
            display: flex;
            animation: scroll 10s linear infinite;
        }

        /* 31. Big Bold Sans-serif Style */
        h1 {
            font-size: 5rem;
            color: #ffde59;
            margin: 0 40px;
            text-transform: uppercase;
            -webkit-text-stroke: 1px #ffde59;
        }

        /* 37. Outline Style Variant for every second word */
        .outline {
            color: transparent;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .center-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffde59;
            color: #000;
            padding: 5px 20px;
            font-size: 1.2rem;
            font-weight: 900;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="center-label">EST. 2026</div>

    <div class="marquee-wrapper">
        <div class="marquee-content">
            <h1>HAPPY BIRTHDAY</h1>
            <h1 class="outline">IT'S YOUR DAY</h1>
            <h1>LEVEL UP</h1>
            <h1 class="outline">STAY GOLD</h1>
            <h1>HAPPY BIRTHDAY</h1>
            <h1 class="outline">IT'S YOUR DAY</h1>
            <h1>LEVEL UP</h1>
            <h1 class="outline">STAY GOLD</h1>
        </div>
    </div>

</body>
</html>
