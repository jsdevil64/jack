<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Midnight Black & Neon</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 3. Midnight Black Background */
            background-color: #0a0a0a; 
            font-family: 'Segoe UI Black', 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .card {
            background: #111;
            padding: 50px;
            width: 340px;
            text-align: center;
            /* 16. Sharp Square Layout */
            border-radius: 0px; 
            /* 20. Gradient Border (Neon Cyan to Pink) */
            border: 4px solid transparent;
            border-image: linear-gradient(45deg, #00f2ff, #0062ff, #ff00ea) 1;
            /* 40. Glowy Text Effect Shadow */
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4), inset 0 0 10px rgba(255, 0, 234, 0.2);
        }

        /* 42. Party Popper 🎉 */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #ff00ea);
        }

        /* 37. All Caps Impact Typography */
        h1 {
            color: #fff;
            font-size: 2.8rem;
            margin: 10px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            /* 40. Glowy Text */
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
        }

        p {
            color: #888;
            font-size: 1rem;
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🎉</div>
        <h1>HBD TO YOU!</h1>
        <p>Light up the night. The celebration starts now.</p>
    </div>

</body>
</html>
