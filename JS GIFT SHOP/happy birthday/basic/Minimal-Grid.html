<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Minimal Grid</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
        }

        /* 25. Minimal Grid Layout (The Feature) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 350px;
            padding: 20px;
        }

        .grid-item {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Span the first item across two columns for a Header effect */
        .header-item {
            grid-column: span 2;
            background: #6c5ce7; /* 5. Lavender Purple */
            color: white;
        }

        /* 45. Star Sparkles ✨ */
        .icon { font-size: 30px; margin-bottom: 10px; }

        h1 { font-size: 1.5rem; margin: 0; font-weight: 800; text-transform: uppercase; }
        
        .stat-num { font-size: 1.8rem; font-weight: 900; color: #6c5ce7; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        p { font-size: 0.9rem; margin-top: 10px; line-height: 1.4; }

    </style>
</head>
<body>

    <div class="grid-container">
        <div class="grid-item header-item">
            <div class="icon">✨</div>
            <h1>HAPPY BDAY</h1>
        </div>

        <div class="grid-item">
            <div class="stat-num">365</div>
            <div class="stat-label">Days Older</div>
        </div>

        <div class="grid-item">
            <div class="stat-num">01</div>
            <div class="stat-label">Big Day</div>
        </div>

        <div class="grid-item header-item" style="background: #a29bfe; grid-column: span 2;">
            <p>Another year of memories locked in. Let's make this one the best yet.</p>
        </div>
    </div>

</body>
</html>
