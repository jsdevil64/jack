<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Royal Purple</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 9. Royal Purple Background */
            background-color: #4b0082; 
            font-family: 'Garamond', serif;
            overflow: hidden;
        }

        .card {
            background-color: #ffffff;
            padding: 50px 35px;
            width: 320px;
            text-align: center;
            /* 15. Rounded Pill Shape corners */
            border-radius: 50px; 
            /* 12. Double Line Border (Royal Purple) */
            border: 6px double #6a0dad;
            /* 19. Shadow-only depth */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* 45. Star Sparkles ✨ */
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
            color: #9370db; /* Medium Purple Sparkle */
            filter: drop-shadow(0 0 5px #ba55d3);
        }

        /* 37. All Caps Impact Typography */
        h1 {
            color: #4b0082;
            font-size: 2.2rem;
            margin: 10px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #6a0dad;
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 500;
            margin-top: 15px;
        }

        /* 18. Top-only Color Bar (Gold/Purple Gradient) */
        .top-divider {
            height: 4px;
            width: 40%;
            background: linear-gradient(to right, transparent, #9370db, transparent);
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-divider"></div>
        <div class="icon">✨</div>
        <h1>Celebrate!</h1>
        <p>Wishing you a year of royalty, elegance, and pure magic.</p>
    </div>

</body>
</html>
