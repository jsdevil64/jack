<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Private Message | HBD 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;500&display=swap');

        :root {
            --env-color: #34495e;
            --env-dark: #2c3e50;
            --paper-white: #fdfdfd;
            --wax-red: #960018;
            --bg: #e0e5ec;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* The Interactive Envelope Container */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--env-color);
            cursor: pointer;
            transition: transform 0.5s;
            perspective: 1000px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        /* The Flap */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--env-dark);
            transform-origin: top;
            transition: transform 0.4s 0.2s, z-index 0.1s 0.3s;
            z-index: 4;
        }

        /* The Wax Seal */
        .wax-seal {
            position: absolute;
            top: 85px;
            left: 130px;
            width: 40px;
            height: 40px;
            background-color: var(--wax-red);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2rem;
            transition: opacity 0.3s;
        }

        /* The Secret Letter */
        .letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            height: 180px;
            background-color: var(--paper-white);
            z-index: 2;
            transition: transform 0.6s 0.4s, top 0.6s 0.4s;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .letter h2 {
            font-family: 'Dancing Script', cursive;
            color: #2c3e50;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        .letter p {
            font-size: 0.8rem;
            line-height: 1.6;
            color: #555;
            margin: 0;
        }

        /* Interactive "Open" State */
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .wax-seal {
            opacity: 0;
            pointer-events: none;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-120px);
            z-index: 10;
        }

        /* Instruction text */
        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Front panels to hide letter when inside */
        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 3;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid var(--env-color);
            bottom: 0;
        }

        .envelope-sides {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 3;
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
            border-left: 150px solid var(--env-dark);
            top: 0;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope">
        <div class="envelope-flap"></div>
        <div class="envelope-sides"></div>
        <div class="envelope-front"></div>
        
        <div class="wax-seal">★</div>
        
        <div class="letter">
            <h2>Happy Birthday</h2>
            <p>To someone truly special. This year, may your story be filled with unexpected joy and new adventures.</p>
            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                <span style="font-family: 'Dancing Script', cursive; font-size: 1.2rem;">With love, X</span>
            </div>
        </div>

        <div class="hint">Tap the seal to open</div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        envelope.addEventListener('click', () => {
            envelope.classList.toggle('open');
        });
    </script>
</body>
</html>
