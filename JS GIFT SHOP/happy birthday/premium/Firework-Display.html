<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Birthday Fireworks</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000205;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 20%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
            opacity: 0;
            animation: emerge 2s 1s forwards;
        }

        @keyframes emerge {
            to { opacity: 1; letter-spacing: 8px; }
        }

        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Happy Birthday</h1>
    </div>

    <div class="hint">Click to launch the fireworks</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, fireworks = [], particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Firework {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * (height * 0.5);
                this.speed = Math.random() * 3 + 4;
                this.angle = Math.atan2(this.targetY - this.y, (width/2) - this.x);
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: -this.speed * 2
                };
                this.hue = Math.random() * 360;
                this.alive = true;
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += 0.1; // Gravity on the way up

                if (this.velocity.y >= 0) {
                    this.explode();
                    this.alive = false;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.fill();
            }

            explode() {
                const count = 100;
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(this.x, this.y, this.hue));
                }
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue + (Math.random() * 40 - 20);
                this.speed = Math.random() * 6 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: Math.sin(this.angle) * this.speed
                };
                this.gravity = 0.15;
                this.friction = 0.95;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
                ctx.fill();
                // Add "Glow"
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                ctx.restore();
            }
        }

        function animate() {
            // Motion blur effect
            ctx.fillStyle = 'rgba(0, 2, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            if (Math.random() < 0.03) fireworks.push(new Firework());

            fireworks = fireworks.filter(f => f.alive);
            fireworks.forEach(f => {
                f.update();
                f.draw();
            });

            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', (e) => {
            // Manual launch
            const fw = new Firework();
            fw.x = e.clientX;
            fw.explode(); // Explode instantly at mouse click
        });

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
