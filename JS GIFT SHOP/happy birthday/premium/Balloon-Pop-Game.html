<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Birthday Balloon Pop</title>
    <style>
        :root {
            --gold: #ffd700;
            --pink: #ff3e81;
            --blue: #00d2ff;
            --purple: #9d50bb;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle, #222, #000);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 100;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1.5rem;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 80px;
            height: 100px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
        }

        /* Balloon String */
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -30px;
            left: 50%;
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.4);
        }

        .pop-effect {
            position: absolute;
            pointer-events: none;
            animation: burst 0.4s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        #intro-screen, #end-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        .btn {
            background: var(--pink);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 62, 129, 0.4);
        }

        .hidden { display: none !important; }

        h1 { font-size: 4rem; margin: 0; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-box">Score: <span id="score">0</span></div>
        <div class="stat-box">Time: <span id="timer">30</span>s</div>
    </div>

    <div id="intro-screen">
        <h1>Happy Birthday!</h1>
        <p>Pop as many balloons as you can!</p>
        <button class="btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="end-screen" class="hidden">
        <h1 id="final-msg">Awesome!</h1>
        <p>Your Final Score: <span id="final-score">0</span></p>
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        const colors = ['#ff3e81', '#00d2ff', '#9d50bb', '#ffd700', '#4caf50'];

        function startGame() {
            document.getElementById('intro-screen').classList.add('hidden');
            gameActive = true;
            spawnBalloon();
            startTimer();
        }

        function startTimer() {
            const timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInt);
                    endGame();
                }
            }, 1000);
        }

        function spawnBalloon() {
            if (!gameActive) return;

            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            
            // Randomize appearance
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * (100 - 60) + 60;
            const xPos = Math.random() * (window.innerWidth - 100);
            const duration = Math.random() * (6 - 3) + 3; // Speed

            balloon.style.left = `${xPos}px`;
            balloon.style.width = `${size}px`;
            balloon.style.height = `${size * 1.2}px`;
            balloon.style.backgroundColor = color;
            balloon.style.boxShadow = `inset -10px -10px 20px rgba(0,0,0,0.2), 0 0 15px ${color}`;
            
            // Animate upwards
            balloon.animate([
                { bottom: '-150px' },
                { bottom: '110vh' }
            ], {
                duration: duration * 1000,
                easing: 'linear'
            }).onfinish = () => balloon.remove();

            balloon.addEventListener('mousedown', (e) => pop(e, balloon));
            balloon.addEventListener('touchstart', (e) => pop(e, balloon));

            document.body.appendChild(balloon);

            // Difficulty curve: spawn faster as time goes on
            setTimeout(spawnBalloon, Math.max(300, 800 - (score * 5)));
        }

        function pop(e, balloon) {
            if (!gameActive) return;
            
            score++;
            document.getElementById('score').innerText = score;

            // Visual Pop Effect
            const burst = document.createElement('div');
            burst.className = 'pop-effect';
            burst.style.left = balloon.style.left;
            burst.style.top = balloon.getBoundingClientRect().top + 'px';
            burst.style.width = balloon.style.width;
            burst.style.height = balloon.style.height;
            burst.style.borderRadius = '50%';
            burst.style.border = `4px solid ${balloon.style.backgroundColor}`;
            
            document.body.appendChild(burst);
            balloon.remove();
            setTimeout(() => burst.remove(), 400);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            if(score > 20) document.getElementById('final-msg').innerText = "Party Master!";
        }
    </script>
</body>
</html>
