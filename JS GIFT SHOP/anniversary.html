<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focused | Luxury Event Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
            --blue: linear-gradient(135deg, #00d4ff, #005f73);
            --rose: linear-gradient(135deg, #e0a3ad, #f7d9d9, #d4818d);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 8px;
            color: #fff;
            margin-bottom: 50px;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 90%;
            max-width: 400px;
        }

        /* Luxury Button Base */
        .lux-btn {
            position: relative;
            padding: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            background: #111;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Individual Themes */
        .btn-birthday { border-color: #00d4ff; color: #00d4ff; }
        .btn-anniversary { border-color: #d4af37; color: #d4af37; }
        .btn-wedding { border-color: #e0a3ad; color: #e0a3ad; }

        /* Hover Effects */
        .lux-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .btn-birthday:hover { background: var(--blue); color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .btn-anniversary:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .btn-wedding:hover { background: var(--rose); color: #000; box-shadow: 0 0 20px rgba(224, 163, 173, 0.4); }

        .btn-subtitle {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* Background Glow */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <h1>Select Category</h1>

    <div class="button-container">
    
        <button class="lux-btn btn-anniversary" onclick="location.href='anniversary/anniversary basic.html'">
            BASIC
            <span class="btn-subtitle"></span>
        </button>
    
        <button class="lux-btn btn-anniversary" onclick="location.href='anniversary/anniversary standard.html'">
            STANDARD
            <span class="btn-subtitle"></span>
        </button>

        <button class="lux-btn btn-anniversary" onclick="location.href='anniversary/anniversary preminum.html'">
            PREMINUM
            <span class="btn-subtitle"></span>
        </button>

        

    </div>

</body>
</html>
