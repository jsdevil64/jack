<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gala Luxe | Anniversary v21.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=JetBrains+Mono&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx: #080808;
            --alabaster: #f9f9f9;
            --silk-grey: #1a1a1a;
        }

        body {
            background-color: var(--onyx);
            color: var(--alabaster);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .serif { font-family: 'Playfair Display', serif; }

        /* Smooth Entrance Sequence */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 0.9s; }

        /* The Gala Card */
        .gala-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 80px 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(135deg, #0a0a0a 0%, #050505 100%);
            position: relative;
        }

        /* Decorative "Stitch" Border */
        .gala-container::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }

        .luxury-btn {
            background: var(--alabaster);
            color: var(--onyx);
            font-weight: 800;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid var(--alabaster);
        }

        .luxury-btn:hover {
            background: transparent;
            color: var(--alabaster);
            letter-spacing: 0.5em;
            transform: scale(1.02);
        }

        /* Technical Serial Accents */
        .serial-tag {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 7px;
            color: #333;
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>

    <main class="gala-container">
        <span class="serial-tag mono uppercase">Ref_No: 21_GALA_LUXE</span>
        
        <header class="mb-16">
            <div class="reveal delay-1">
                <p class="mono text-[8px] tracking-[1.2em] text-zinc-600 mb-8 uppercase">Request the Honor of Your Presence</p>
                <h1 class="serif text-6xl italic leading-none mb-2">The Twenty-One</h1>
                <p class="text-[10px] tracking-[0.4em] uppercase font-light text-zinc-400">Anniversary Gala</p>
            </div>
        </header>

        <section class="reveal delay-2 mb-16 space-y-6">
            <div class="h-[1px] w-12 bg-zinc-800 mx-auto"></div>
            <p class="text-sm italic font-serif leading-relaxed text-zinc-300">
                A night dedicated to a decade of architecture, code, and the evolution of a digital legacy.
            </p>
            <div class="mono text-[9px] tracking-widest text-zinc-500">
                10 . 04 . 2026 // 19:00 HRS
            </div>
        </section>

        <footer class="reveal delay-3">
            <button class="luxury-btn w-full py-5 text-[9px] uppercase tracking-[0.4em]">
                Secure Invitation ($30)
            </button>
            <p class="mt-12 mono text-[7px] text-zinc-800 tracking-[1em] uppercase">Black-Tie Protocol • Private Access</p>
        </footer>
    </main>

</body>
</html>
