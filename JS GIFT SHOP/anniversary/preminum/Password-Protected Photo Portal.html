<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Private Anniversary Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-vault: #050505;
            --accent-gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-vault);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Auth Screen Styling */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg-vault);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .passcode-input {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent-gold);
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            width: 180px;
            text-align: center;
            letter-spacing: 0.5rem;
            padding: 10px;
            border-radius: 12px;
            outline: none;
        }

        .passcode-input:focus { border-color: var(--accent-gold); }

        /* The Grid (Hidden by default) */
        .vault-content {
            opacity: 0;
            transform: translateY(20px);
            transition: 1s ease 0.5s;
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Access Granted State */
        .unlocked #auth-screen { transform: translateY(-100%); }
        .unlocked .vault-content { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="text-center">
            <p class="mono text-[10px] text-stone-500 uppercase tracking-[0.6em] mb-8">System Encrypted // Enter Key</p>
            <input type="password" id="pin" class="passcode-input" maxlength="4" placeholder="••••">
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 uppercase hidden">Access Denied: Invalid Key</p>
            <p class="text-stone-600 text-[9px] mt-20 uppercase tracking-widest">Hint: The Year it Began (2016)</p>
        </div>
    </div>

    <main class="vault-content">
        <header class="text-center mb-20">
            <p class="mono text-[10px] text-amber-500 uppercase mb-4">Decrypted Milestone // v13.0</p>
            <h1 class="text-4xl font-bold tracking-tighter uppercase">The Private Memoir.</h1>
        </header>

        <div class="columns-1 md:columns-3 gap-6">
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80&w=600" class="w-full grayscale hover:grayscale-0 transition-all duration-700" alt="Memory">
                <div class="p-4"><p class="mono text-[8px] text-stone-500">ENTRY_001.JPG</p></div>
            </div>
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=600" class="w-full grayscale hover:grayscale-0 transition-all duration-700" alt="Memory">
                <div class="p-4"><p class="mono text-[8px] text-stone-500">ENTRY_042.JPG</p></div>
            </div>
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1516589174184-c6852b614b6c?q=80&w=600" class="w-full grayscale hover:grayscale-0 transition-all duration-700" alt="Memory">
                <div class="p-4"><p class="mono text-[8px] text-stone-500">ENTRY_105.JPG</p></div>
            </div>
        </div>

        <footer class="mt-20 text-center border-t border-white/5 pt-10">
            <button class="border border-white/20 px-8 py-3 text-[10px] uppercase tracking-[0.4em] hover:bg-white hover:text-black transition-all">
                Lock Vault & Logout ($30)
            </button>
        </footer>
    </main>

    <script>
        const pinInput = document.getElementById('pin');
        const correctPin = "2016"; // Set your anniversary year here

        pinInput.addEventListener('input', (e) => {
            if (e.target.value === correctPin) {
                document.body.classList.add('unlocked');
                // Haptic feedback simulation
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            } else if (e.target.value.length === 4) {
                document.getElementById('error-msg').classList.remove('hidden');
                e.target.value = "";
                setTimeout(() => {
                    document.getElementById('error-msg').classList.add('hidden');
                }, 2000);
            }
        });
    </script>
</body>
</html>
