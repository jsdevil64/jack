<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Particles | A & J</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --neon-red: #ff2d55;
            --neon-blue: #007aff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            overflow: hidden;
            font-family: 'Space Mono', monospace;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            pointer-events: none; /* Allows clicking "through" to particles */
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .rim-light {
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-blue);
            font-family: 'Inter', sans-serif;
            letter-spacing: -2px;
        }

        .btn-particle {
            background: linear-gradient(90deg, var(--neon-red), var(--neon-blue));
            color: white;
            padding: 15px 40px;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 30px;
            transition: 0.4s;
            border: none;
            cursor: pointer;
        }

        .btn-particle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content-overlay">
        <div class="glass-box">
            <p class="text-[10px] tracking-[0.8em] text-white/40 mb-4 uppercase">System Anniversary v10.0</p>
            <h1 class="text-6xl text-white rim-light mb-4">ALEX + JORDAN</h1>
            <p class="text-xs text-white/60 tracking-widest italic">"Every particle in sync for ten years."</p>
            
            <div class="space-y-4">
                <button class="btn-particle">Boost Frequency ($15)</button>
                <p class="text-[9px] text-white/20 uppercase tracking-[0.4em] mt-4">Low Latency Pulse ($6)</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = Math.random() > 0.5 ? '#ff2d55' : '#007aff';
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // Drawing a heart shape
                const x = this.x;
                const y = this.y;
                const s = this.size;
                ctx.moveTo(x, y + s / 4);
                ctx.quadraticCurveTo(x, y, x + s / 2, y);
                ctx.quadraticCurveTo(x + s, y, x + s, y + s / 4);
                ctx.quadraticCurveTo(x + s, y + s / 2, x + s / 2, y + s * 0.75);
                ctx.lineTo(x, y + s);
                ctx.lineTo(x - s / 2, y + s * 0.75);
                ctx.quadraticCurveTo(x - s, y + s / 2, x - s, y + s / 4);
                ctx.quadraticCurveTo(x - s, y, x - s / 2, y);
                ctx.quadraticCurveTo(x, y, x, y + s / 4);
                ctx.fill();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
