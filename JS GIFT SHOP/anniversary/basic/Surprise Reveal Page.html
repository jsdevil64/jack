<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You | A & J</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Bricolage Grotesque', sans-serif; overflow: hidden; }
        .handwritten { font-family: 'Caveat', cursive; }

        /* The Reveal Container */
        .reveal-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* The Hidden Content */
        .hidden-content {
            text-align: center;
            opacity: 0;
            filter: blur(20px);
            transform: scale(0.9);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* The Click Prompt */
        .click-prompt {
            position: absolute;
            z-index: 20;
            transition: 0.5s;
        }

        .pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        /* Active State */
        .is-revealed .hidden-content {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        .is-revealed .click-prompt {
            opacity: 0;
            pointer-events: none;
        }

        .btn-reveal {
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 30px;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.3s;
        }
    </style>
</head>
<body onclick="revealSurprise()">

    <div class="reveal-wrapper" id="mainWrapper">
        
        <div class="click-prompt flex flex-col items-center">
            <div class="w-16 h-16 bg-sky-500/20 rounded-full flex items-center justify-center relative">
                <div class="absolute inset-0 bg-sky-500 rounded-full pulse"></div>
                <span class="text-2xl relative z-10">🎁</span>
            </div>
            <p class="mt-4 text-[10px] tracking-[0.5em] uppercase text-sky-400 font-bold">Tap to Open</p>
        </div>

        <div class="hidden-content p-6">
            <p class="handwritten text-4xl text-sky-300 mb-4">Happy Anniversary!</p>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 uppercase leading-none">Alex<br>& Jordan</h1>
            
            <div class="max-w-xs mx-auto space-y-6">
                <p class="text-sm opacity-60 leading-relaxed">
                    Surprise! You made it through 365 days of my bad jokes. Let's celebrate with something sweet.
                </p>
                
                <div class="flex flex-col gap-3">
                    <button class="btn-reveal">Dessert Fund ($5)</button>
                    <button class="text-[9px] uppercase tracking-widest opacity-40 hover:opacity-100">Coffee Surprise ($3)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function revealSurprise() {
            const wrapper = document.getElementById('mainWrapper');
            if(!wrapper.classList.contains('is-revealed')) {
                wrapper.classList.add('is-revealed');
                
                // Trigger Celebration
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#38bdf8', '#ffffff', '#0f172a']
                });
            }
        }
    </script>
</body>
</html>
