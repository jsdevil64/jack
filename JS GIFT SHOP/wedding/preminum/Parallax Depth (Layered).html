<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Depth | Alex & Jordan</title>
    <style>
        :root {
            --cream: #fdfaf5;
            --gold: #c5a059;
            --deep-green: #1b3022;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* The Parallax Container */
        .parallax-wrapper {
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            perspective: 10px; /* Essential for 3D depth */
            background-color: var(--cream);
        }

        .parallax-group {
            position: relative;
            height: 100vh;
            transform-style: preserve-3d;
        }

        /* Layer Logic */
        .layer {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* Deep Background (Slowest) */
        .layer-bg {
            transform: translateZ(-10px) scale(2.1);
            background: url('https://images.unsplash.com/photo-1522673607200-164883e248bf?q=80&w=1600') center/cover;
            filter: brightness(0.8) blur(2px);
            z-index: 1;
        }

        /* Mid Layer (Decor/Florals) */
        .layer-mid {
            transform: translateZ(-5px) scale(1.6);
            z-index: 2;
        }
        
        .floral-overlay {
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png'); /* Placeholder for silk/floral png */
            opacity: 0.3;
        }

        /* Foreground (Text/Main Content) */
        .layer-fg {
            transform: translateZ(0);
            z-index: 3;
            pointer-events: auto;
        }

        /* Content Styling */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 60px;
            border: 1px solid var(--gold);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            max-width: 500px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--deep-green);
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        .date-line {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: bold;
        }

        .btn-enter {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 35px;
            border: 1px solid var(--gold);
            color: var(--deep-green);
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .btn-enter:hover {
            background: var(--gold);
            color: white;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="parallax-wrapper">
        <div class="parallax-group">
            
            <div class="layer layer-bg"></div>

            <div class="layer layer-mid">
                <div class="floral-overlay"></div>
            </div>

            <div class="layer layer-fg">
                <div class="card">
                    <span class="date-line">August 22, 2026</span>
                    <h1>ALEX &<br>JORDAN</h1>
                    <p style="opacity: 0.7; font-size: 0.9rem; margin-top: 10px;">
                        TWO SOULS, ONE JOURNEY.
                    </p>
                    <a href="#" class="btn-enter">Explore the Details</a>
                </div>
            </div>

        </div>
        
        <section style="height: 100vh; background: var(--deep-green); color: white; display: flex; align-items: center; justify-content: center; padding: 40px; text-align: center;">
            <div>
                <h2 style="font-family: 'Playfair Display'; font-size: 2.5rem;">The Venue</h2>
                <p style="margin-top: 20px; opacity: 0.8;">The Grand Conservatory • 5:00 PM</p>
            </div>
        </section>
    </div>

</body>
</html>
