<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Union | Alex & Jordan</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --accent-gold: #e5c07b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(45deg, #1a1c2c, #4a192c); /* Fallback */
            background: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=2000') center/cover no-repeat fixed;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* The Floating Glass Panel */
        .glass-panel {
            width: 90%;
            max-width: 600px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .divider {
            height: 1px;
            width: 60px;
            background: var(--accent-gold);
            margin: 30px auto;
        }

        .event-info {
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 40px;
        }

        /* Glass Button Interaction */
        .btn-glass {
            display: inline-block;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-glass:hover {
            background: white;
            color: #4a192c;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        /* Secondary Decorative Elements */
        .blob {
            position: fixed;
            width: 300px; height: 300px;
            background: var(--accent-gold);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="blob" style="top: 10%; left: 10%;"></div>
    <div class="blob" style="bottom: 10%; right: 10%; background: #ff7eb3;"></div>

    <main class="glass-panel">
        <p style="font-size: 0.7rem; letter-spacing: 5px; opacity: 0.8; margin-bottom: 20px;">YOU ARE INVITED TO</p>
        <h1>ALEX &<br>JORDAN</h1>
        
        <div class="divider"></div>

        <div class="event-info">
            08.22.2026 • 5:30 PM<br>
            THE CRYSTAL PAVILION
        </div>

        <a href="#" class="btn-glass">Join the Celebration</a>
    </main>

</body>
</html>
