<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol: Union | Alex & Jordan</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --deep-space: #050505;
            --terminal-white: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--deep-space);
            color: var(--terminal-white);
            font-family: 'Inter', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Scan-line CRT Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Pulsing Glow Backgrounds */
        .glow-orb {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-10%, -10%) scale(1); opacity: 0.5; }
            100% { transform: translate(10%, 10%) scale(1.2); opacity: 0.8; }
        }

        /* The Cyber-Glass Card */
        .cyber-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 480px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }

        .protocol-header {
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif; /* Contrast luxury with tech */
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .data-stream {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--neon-magenta);
            margin-bottom: 40px;
            border-top: 1px solid rgba(255, 0, 255, 0.2);
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            padding: 15px 0;
        }

        .btn-initiate {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-initiate:hover {
            background: var(--neon-cyan);
            color: var(--deep-space);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glow-orb" style="top: -20%; right: -10%;"></div>
    <div class="glow-orb" style="bottom: -20%; left: -10%; background: radial-gradient(circle, rgba(255, 0, 255, 0.1) 0%, transparent 70%);"></div>

    <main class="cyber-card">
        <div class="protocol-header">Protocol: ETERNAL_UNION_2026</div>
        
        <h1>ALEX &<br>JORDAN</h1>
        
        <div class="data-stream">
            LOC: NEON_CITY_ATRIUM // 12.00.42.11<br>
            TIME_STAMP: 22.08.2026_1900HRS
        </div>

        <p style="font-size: 0.8rem; line-height: 1.8; opacity: 0.6; margin-bottom: 30px;">
            JOIN THE NETWORK AS WE SYNC OUR<br>
            LIFECYCLES IN A PERMANENT ARRAY.
        </p>

        <a href="#" class="btn-initiate">Initialize RSVP</a>
    </main>

</body>
</html>
