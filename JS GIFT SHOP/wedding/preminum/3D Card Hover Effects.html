<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Invitation | Alex & Jordan</title>
    <style>
        :root {
            --paper: #ffffff;
            --gold-foil: linear-gradient(135deg, #c5a059 0%, #f1d377 50%, #c5a059 100%);
            --bg-shade: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-shade);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            perspective: 1000px; /* Essential for 3D depth */
        }

        /* The 3D Card Wrapper */
        .card-container {
            width: 400px;
            height: 550px;
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--paper);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transform-style: preserve-3d;
        }

        /* Internal Elements with Z-Depth */
        .card-content {
            transform: translateZ(60px); /* Makes text "float" above the card */
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .gold-line {
            width: 80px;
            height: 2px;
            background: var(--gold-foil);
            margin: 20px 0;
        }

        .date-badge {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c5a059;
            font-weight: bold;
        }

        /* The Moving Shine Effect */
        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, 
                transparent 20%, 
                rgba(255,255,255,0.4) 45%, 
                rgba(255,255,255,0.4) 55%, 
                transparent 80%);
            z-index: 5;
            transform: translateZ(1px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-container:hover .card::after {
            opacity: 1;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card-container" id="tiltCard">
        <div class="card">
            <div class="card-content">
                <span class="date-badge">August 22, 2026</span>
                <div class="gold-line" style="margin: 30px auto;"></div>
                <h1>ALEX &<br>JORDAN</h1>
                <p style="opacity: 0.6; font-size: 0.9rem; margin-top: 15px;">
                    Request the honor of your presence at the celebration of their union.
                </p>
                <div style="margin-top: 50px; font-size: 0.7rem; letter-spacing: 2px; color: #888;">
                    THE GLASS PAVILION • 5:00 PM
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('tiltCard');
        const cardInner = card.querySelector('.card');

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 10;
            const rotateY = (centerX - x) / 10;

            cardInner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        card.addEventListener('mouseleave', () => {
            cardInner.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    </script>
</body>
</html>
