<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focused - 10 Mini Projects</title>
    <style>
        /* Dark Theme Design */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 8px;
            color: #e0a3ad;
            margin-bottom: 50px;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(228, 111, 132);
        }

        /* 10 files-aiyum grid-ah vakkurathuku */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .mini-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            height: 150px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .mini-card:hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(1, 134, 187);
        }

        /* Iframe preview settings */
        iframe {
            width: 200%;
            height: 200%;
            border: none;
            pointer-events: none; /* Click panna iframe kulla pogama irukka */
            zoom: 0.5; /* Preview size-ah kurikka */
            -moz-transform: scale(0.5);
            -moz-transform-origin: 0 0;
        }

        .label {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            width: 100%;
            text-align: center;
            padding: 5px 0;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>PREMINUM</h1>

    <div class="grid-container">
        <div class="mini-card" onclick="window.location.href='preminum/3D Card Hover Effects.html'">
            <iframe src="preminum/3D Card Hover Effects.html"></iframe>
            <div class="label">3D Card Hover Effects</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Background Music Visualizer.html'">
            <iframe src="preminum/Background Music Visualizer.html"></iframe>
            <div class="label">Background Music Visualizer</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Black-Tie Luxury (Gold Leaf).html'">
            <iframe src="preminum/Black-Tie Luxury (Gold Leaf).html"></iframe>
            <div class="label">Black-Tie Luxury (Gold Leaf)</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Blue and Brown.html'">
            <iframe src="preminum/Blue and Brown.html"></iframe>
            <div class="label">Blue and Brown</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Cyber-Wedding Futuristic.html'">
            <iframe src="preminum/Cyber-Wedding Futuristic.html"></iframe>
            <div class="label">Cyber-Wedding Futuristic</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Floating Glassmorphism UI.html'">
            <iframe src="preminum/Floating Glassmorphism UI.html"></iframe>
            <div class="label">Floating Glassmorphism UI</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Modern Arabic.html'">
            <iframe src="preminum/Modern Arabic.html"></iframe>
            <div class="label">Modern Arabic</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/Parallax Depth (Layered).html'">
            <iframe src="preminum/Parallax Depth (Layered).html"></iframe>
            <div class="label">Parallax Depth (Layered)</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/tamil nadu wedding.html'">
            <iframe src="preminum/tamil nadu wedding.html"></iframe>
            <div class="label">tamil nadu wedding</div>
        </div>

        <div class="mini-card" onclick="window.location.href='preminum/The Royal Silk.html'">
            <iframe src="preminum/The Royal Silk.html"></iframe>
            <div class="label">The Royal Silk</div>
        </div>

    </div>

</body>
</html>
