<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Down | Alex & Jordan</title>
    <style>
        :root {
            --accent: #b89c6d;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--dark);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
        }

        .countdown-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
        }

        .number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            color: #ccc;
        }

        .event-date {
            margin-top: 40px;
            font-size: 1.1rem;
            letter-spacing: 3px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }

        @media (max-width: 480px) {
            .number { font-size: 2rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <p style="letter-spacing: 3px; margin-bottom: 10px;">UNTIL WE SAY I DO</p>
        <h1>ALEX & JORDAN</h1>

        <div class="timer" id="timer">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>

        <p class="event-date">AUGUST 22, 2026</p>
    </div>

    <script>
        // Set the wedding date (Year, Month [0-11], Day, Hour, Minute)
        const weddingDate = new Date("August 22, 2026 16:30:00").getTime();

        const updateTimer = () => {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            // Math calculations for time units
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // Output the results
            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            // If the countdown is finished
            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("timer").innerHTML = "<h3>WE ARE MARRIED!</h3>";
            }
        };

        const timerInterval = setInterval(updateTimer, 1000);
        updateTimer(); // Run once immediately
    </script>
</body>
</html>
