<!DOCTYPE html>
<html lang="En">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focused | Luxury Event Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
            --blue: linear-gradient(135deg, #00d4ff, #005f73);
            --rose: linear-gradient(135deg, #e0a3ad, #f7d9d9, #d4818d);
            --purple: linear-gradient(135deg, #a855f7, #d8b4fe, #7e22ce);
        }

        /* --- Luxury Preloader Styles --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-customize { 
           border-color: #a855f7; 
           color: #a855f7; 
        }

        .btn-customize:hover { 
           background: var(--purple); 
           color: #000; 
           box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); 
        }


        .welcome-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            margin-bottom: 10px;
            animation: fadeInDown 1s ease-out forwards;
        }

        .js-main-logo {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            font-weight: bold;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 12px;
            margin: 5px 0;
            animation: glow-pulse 2s infinite ease-in-out, zoomIn 1.5s forwards;
        }

        .sub-brand-text {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #fcf6ba; /* Light Gold */
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 15px rgba(191, 149, 63, 0.2); }
            50% { text-shadow: 0 0 35px rgba(252, 246, 186, 0.5); }
        }

        .loader-line {
            width: 0;
            height: 1px;
            background: var(--gold);
            margin-top: 20px;
            animation: line-grow 1.8s forwards 0.5s;
        }

        @keyframes line-grow {
            to { width: 200px; }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- Original Styles --- */
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 8px;
            color: #fff;
            margin-bottom: 50px;
            text-align: center;
            font-size: 2rem;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 90%;
            max-width: 400px;
        }

        .lux-btn {
            position: relative;
            padding: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #111;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-birthday { border-color: #00d4ff; color: #00d4ff; }
        .btn-anniversary { border-color: #d4af37; color: #d4af37; }
        .btn-wedding { border-color: #e0a3ad; color: #e0a3ad; }

        .lux-btn:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .btn-birthday:hover { background: var(--blue); color: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .btn-anniversary:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .btn-wedding:hover { background: var(--rose); color: #000; box-shadow: 0 0 20px rgba(224, 163, 173, 0.4); }

        .btn-subtitle {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="welcome-text">Welcome to</div>
            <div class="js-main-logo">JS</div>
            <div class="sub-brand-text">Digital Gift Shop</div>
            <div class="loader-line"></div>
        </div>
    </div>

    <div class="glow"></div>

    <h1>Select Category</h1>

    <div class="button-container">
        <button class="lux-btn btn-birthday" onclick="location.href='JS GIFT SHOP/happy birthday.html'">
            Happy Birthday
            <span class="btn-subtitle">Luxury Blue Theme</span>
        </button>

        <button class="lux-btn btn-anniversary" onclick="location.href='JS GIFT SHOP/anniversary.html'">
            Anniversary
            <span class="btn-subtitle">Royal Gold Theme</span>
        </button>

        <button class="lux-btn btn-wedding" onclick="location.href='JS GIFT SHOP/wedding.html'">
            Wedding
            <span class="btn-subtitle">Rose Gold Theme</span>
        </button>

        <button class="lux-btn btn-customize" onclick="location.href='JS GIFT SHOP/common.html'">
           New Customize
           <span class="btn-subtitle">Bespoke Design Theme</span>
        </button>
    </div>

    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader');
            

            setTimeout(() => {
                loader.classList.add('fade-out');
                document.body.style.overflow = 'auto';
            }, 3000); 
        });
    </script>

</body>
</html>
